name: Rust (src-tauri)

on:
  workflow_dispatch:

  push:
    branches: ["main"]
    paths:
      - "src-tauri/**"
      - ".github/workflows/rust.yml"

  pull_request:
    branches: ["main"]
    paths:
      - "src-tauri/**"
      - ".github/workflows/rust.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libssl-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build
        run: cargo build --manifest-path src-tauri/Cargo.toml --verbose

      - name: Run tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --verbose
