name: windows-tauri-build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles (NSIS + MSI)
        run: npm run tauri:build

      - name: Create portable zip (for itch.io)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          rm -rf portable
          mkdir -p portable

          cp src-tauri/target/release/*.exe portable/
          cp src-tauri/target/release/*.dll portable/ || true

          if [ -d src-tauri/target/release/resources ]; then
            cp -R src-tauri/target/release/resources portable/
          fi

          rm -f studio-magnate-windows-portable.zip

          python - <<'PY'
          import os
          import zipfile

          out_path = "studio-magnate-windows-portable.zip"
          root_dir = "portable"

          with zipfile.ZipFile(out_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
            for folder, _, files in os.walk(root_dir):
              for name in files:
                path = os.path.join(folder, name)
                arcname = os.path.relpath(path, root_dir)
                zf.write(path, arcname)
          PY

          python -c 'import sys, zipfile; z=zipfile.ZipFile("studio-magnate-windows-portable.zip"); bad=z.testzip(); sys.exit(0 if bad is None else 1)'

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: studio-magnate-windows-portable
          path: studio-magnate-windows-portable.zip

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: studio-magnate-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: studio-magnate-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
