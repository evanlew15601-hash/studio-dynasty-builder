name: windows-tauri-build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare Tauri icons
        shell: bash
        run: |
          set -euo pipefail
          node scripts/prepare-tauri-icons.mjs
          ls -la src-tauri/icons

      - name: Ensure Windows favicon.ico is RC-compatible
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if (-not (Test-Path -Path 'src-tauri/icons/icon.ico')) {
            throw 'Missing src-tauri/icons/icon.ico after icon preparation'
          }

          Copy-Item 'src-tauri/icons/icon.ico' 'public/favicon.ico' -Force

          $bytes = [System.IO.File]::ReadAllBytes('public/favicon.ico')
          if ($bytes.Length -lt 8) {
            throw 'public/favicon.ico too small'
          }

          $pngSig = [byte[]](0x89,0x50,0x4E,0x47,0x0D,0x0A,0x1A,0x0A)
          for ($i = 0; $i -le $bytes.Length - $pngSig.Length; $i++) {
            $match = $true
            for ($j = 0; $j -lt $pngSig.Length; $j++) {
              if ($bytes[$i + $j] -ne $pngSig[$j]) { $match = $false; break }
            }
            if ($match) { throw 'public/favicon.ico contains PNG-compressed frame data (not RC-compatible)'
            }
          }

      - name: Build Tauri bundles (NSIS + MSI)
        run: npm run tauri:build

      - name: Create portable zip (for itch.io)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          rm -rf portable
          mkdir -p portable

          cp src-tauri/target/release/*.exe portable/
          cp src-tauri/target/release/*.dll portable/ || true

          if [ -d src-tauri/target/release/resources ]; then
            cp -R src-tauri/target/release/resources portable/
          fi

          tar -a -c -f studio-magnate-windows-portable.zip -C portable .

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: studio-magnate-windows-portable
          path: studio-magnate-windows-portable.zip

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: studio-magnate-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: studio-magnate-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
