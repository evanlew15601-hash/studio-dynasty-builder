name: windows-tauri-build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles (NSIS + MSI)
        run: npm run tauri:build

      - name: Create portable zip (for Steam)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          rm -rf portable
          mkdir -p portable

          cp src-tauri/target/release/*.exe portable/
          cp src-tauri/target/release/*.dll portable/ || true

          if [ -d src-tauri/target/release/resources ]; then
            cp -R src-tauri/target/release/resources portable/
          fi

          tar -a -c -f studio-magnate-windows-portable.zip -C portable .

      - name: Upload portable zip
        uses: actions/upload-artifact@v6
        with:
          name: studio-magnate-windows-portable
          path: studio-magnate-windows-portable.zip

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v6
        with:
          name: studio-magnate-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload MSI installer
        uses: actions/upload-artifact@v6
        with:
          name: studio-magnate-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
