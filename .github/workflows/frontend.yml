name: frontend

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "tests/**"
      - "e2e/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "tailwind.config.ts"
      - "eslint.config.js"
      - "types/**"
      - ".github/workflows/frontend.yml"

  pull_request:
    branches: ["main"]
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "tests/**"
      - "e2e/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "tailwind.config.ts"
      - "eslint.config.js"
      - "types/**"
      - ".github/workflows/frontend.yml"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: License allowlist check
        run: npm run licenses:check

      - name: Generate SBOM (CycloneDX)
        run: npm run sbom:generate

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v6
        with:
          name: sbom-cyclonedx
          path: sbom/sbom.cdx.json
          if-no-files-found: error
