name: itch-build

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional version label used for artifact naming. Defaults to tag (if any) or package.json version.
        required: false
        type: string

  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-and-upload:
    name: ${{ matrix.platform }} -> build artifact (${{ matrix.channel }})
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            channel: windows
          - platform: ubuntu-22.04
            channel: linux
          - platform: macos-latest
            channel: mac

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Determine release version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          VERSION="${INPUT_VERSION:-}"

          if [ -z "$VERSION" ] && [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            VERSION="${VERSION#v}"
          fi

          if [ -z "$VERSION" ]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: "Windows: generate RC-compatible favicon.ico"
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $InputPng = 'src-tauri/icons/icon.png'
          $OutIco = 'public/favicon.ico'

          if (-not (Test-Path -Path $InputPng -PathType Leaf)) {
            throw "Input PNG not found: $InputPng"
          }

          New-Item -ItemType Directory -Force -Path (Split-Path $OutIco) | Out-Null

          Add-Type -AssemblyName System.Drawing

          $img = [System.Drawing.Image]::FromFile($InputPng)
          try {
            $size = 256
            $bmp = New-Object System.Drawing.Bitmap $size, $size
            $gfx = [System.Drawing.Graphics]::FromImage($bmp)

            try {
              $gfx.InterpolationMode = [System.Drawing.Drawing2D.InterpolationMode]::HighQualityBicubic
              $gfx.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::HighQuality
              $gfx.PixelOffsetMode = [System.Drawing.Drawing2D.PixelOffsetMode]::HighQuality
              $gfx.CompositingQuality = [System.Drawing.Drawing2D.CompositingQuality]::HighQuality
              $gfx.DrawImage($img, 0, 0, $size, $size)
            }
            finally {
              $gfx.Dispose()
            }

            $hIcon = $bmp.GetHicon()

            Add-Type @"
          using System;
          using System.Runtime.InteropServices;
          public static class Win32 {
            [DllImport("user32.dll", SetLastError=true)]
            public static extern bool DestroyIcon(IntPtr hIcon);
          }
          "@

            try {
              $icon = [System.Drawing.Icon]::FromHandle($hIcon)
              try {
                $fs = New-Object System.IO.FileStream($OutIco, [System.IO.FileMode]::Create)
                try { $icon.Save($fs) } finally { $fs.Dispose() }
              }
              finally {
                $icon.Dispose()
              }
            }
            finally {
              [Win32]::DestroyIcon($hIcon) | Out-Null
              $bmp.Dispose()
            }
          }
          finally {
            $img.Dispose()
          }

          Copy-Item $OutIco 'src-tauri/icons/icon.ico' -Force

          # Reject PNG-compressed frames (RC.EXE will error RC2175)
          $bytes = [System.IO.File]::ReadAllBytes($OutIco)
          $pngSig = [byte[]](0x89,0x50,0x4E,0x47,0x0D,0x0A,0x1A,0x0A)
          for ($i = 0; $i -le $bytes.Length - $pngSig.Length; $i++) {
            $match = $true
            for ($j = 0; $j -lt $pngSig.Length; $j++) {
              if ($bytes[$i + $j] -ne $pngSig[$j]) { $match = $false; break }
            }
            if ($match) { throw 'public/favicon.ico contains PNG-compressed frame data (not RC-compatible)' }
          }

      - name: "macOS: generate icon.icns"
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail

          SRC="src-tauri/icons/icon.png"
          OUT_DIR="src-tauri/icons"
          ICONSET_DIR="${RUNNER_TEMP}/icon.iconset"

          rm -rf "$ICONSET_DIR"
          mkdir -p "$ICONSET_DIR"

          sizes=(16 32 64 128 256 512)
          for s in "${sizes[@]}"; do
            sips -z "$s" "$s" "$SRC" --out "$ICONSET_DIR/icon_${s}x${s}.png" >/dev/null
            s2=$((s*2))
            sips -z "$s2" "$s2" "$SRC" --out "$ICONSET_DIR/icon_${s}x${s}@2x.png" >/dev/null
          done

          iconutil -c icns "$ICONSET_DIR" -o "$OUT_DIR/icon.icns"

      - name: "macOS: create CI config with icns icon"
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail

          node --input-type=module - <<'NODE'
          import fs from 'node:fs';

          const p = 'src-tauri/tauri.release.conf.json';
          const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
          cfg.bundle = cfg.bundle || {};
          cfg.bundle.icon = ['icons/icon.icns'];
          fs.writeFileSync('src-tauri/tauri.ci.macos.conf.json', JSON.stringify(cfg, null, 2));
          NODE

      - name: Build Tauri
        shell: bash
        env:
          RUST_BACKTRACE: 1
        run: |
          set -euo pipefail

          mkdir -p ci-logs
          LOG_FILE="ci-logs/tauri-build-${{ matrix.channel }}.log"

          {
            case "${{ matrix.channel }}" in
              linux)
                npm run tauri -- build --bundles appimage --config src-tauri/tauri.release.conf.json
                ;;
              mac)
                npm run tauri -- build --bundles dmg --no-sign --config src-tauri/tauri.ci.macos.conf.json
                ;;
              windows)
                npm run tauri -- build --no-bundle --config src-tauri/tauri.release.conf.json
                ;;
              *)
                echo "Unknown channel: ${{ matrix.channel }}" >&2
                exit 1
                ;;
            esac
          } 2>&1 | tee "$LOG_FILE"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: tauri-build-logs-${{ matrix.channel }}
          path: ci-logs/tauri-build-${{ matrix.channel }}.log
          if-no-files-found: warn

      - name: Prepare itch artifact
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          if [ "${{ matrix.channel }}" = "windows" ]; then
            OUT_DIR="studio-magnate-windows-${APP_VERSION}"
            rm -rf "$OUT_DIR"
            mkdir -p "$OUT_DIR"

            if [ -f src-tauri/target/release/studio-magnate.exe ]; then
              cp src-tauri/target/release/studio-magnate.exe "$OUT_DIR"/
            else
              cp src-tauri/target/release/*.exe "$OUT_DIR"/
            fi

            cp src-tauri/target/release/*.dll "$OUT_DIR"/ || true

            if [ -d src-tauri/target/release/resources ]; then
              cp -R src-tauri/target/release/resources "$OUT_DIR"/
            fi

            # Push a directory instead of a .zip. This avoids intermittent "zip: not a valid zip file"
            # failures and enables better delta-patching on itch.io.
            echo "path=$OUT_DIR" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ matrix.channel }}" = "linux" ]; then
            appimages=(src-tauri/target/release/bundle/appimage/*.AppImage)
            if [ ${#appimages[@]} -lt 1 ]; then
              echo "No AppImage bundle found at src-tauri/target/release/bundle/appimage/*.AppImage" >&2
              exit 1
            fi

            OUT_PATH="studio-magnate-linux-${APP_VERSION}.AppImage"
            cp -p "${appimages[0]}" "$OUT_PATH"

            echo "path=$OUT_PATH" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ matrix.channel }}" = "mac" ]; then
            dmgs=(src-tauri/target/release/bundle/dmg/*.dmg)
            if [ ${#dmgs[@]} -ge 1 ]; then
              OUT_PATH="studio-magnate-mac-${APP_VERSION}.dmg"
              cp -p "${dmgs[0]}" "$OUT_PATH"

              echo "path=$OUT_PATH" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            apps=(src-tauri/target/release/bundle/macos/*.app)
            if [ ${#apps[@]} -lt 1 ]; then
              echo "No dmg or .app bundle found." >&2
              exit 1
            fi

            OUT_PATH="studio-magnate-macos-${APP_VERSION}.zip"
            ditto -c -k --sequesterRsrc --keepParent "${apps[0]}" "$OUT_PATH"
            echo "path=$OUT_PATH" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Unknown channel: ${{ matrix.channel }}" >&2
          exit 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: studio-magnate-${{ matrix.channel }}-${{ env.APP_VERSION }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error

      
