name: itch-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional version label passed to butler (--userversion). Defaults to tag (if any) or package.json version.
        required: false
        type: string

  release:
    types: [published, released, prereleased]

  push:
    tags:
      - 'v*'

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Build (${{ matrix.channel }})
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            channel: windows
          - platform: ubuntu-22.04
            channel: linux
          - platform: macos-latest
            channel: mac

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'release' && format('refs/tags/{0}', github.event.release.tag_name) || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: "Windows: generate RC-compatible favicon.ico"
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $InputPng = 'src-tauri/icons/icon.png'
          $OutIco = 'public/favicon.ico'

          if (-not (Test-Path -Path $InputPng -PathType Leaf)) {
            throw "Input PNG not found: $InputPng"
          }

          New-Item -ItemType Directory -Force -Path (Split-Path $OutIco) | Out-Null

          Add-Type -AssemblyName System.Drawing

          $img = [System.Drawing.Image]::FromFile($InputPng)
          try {
            $size = 256
            $bmp = New-Object System.Drawing.Bitmap $size, $size
            $gfx = [System.Drawing.Graphics]::FromImage($bmp)

            try {
              $gfx.InterpolationMode = [System.Drawing.Drawing2D.InterpolationMode]::HighQualityBicubic
              $gfx.SmoothingMode = [System.Drawing.Drawing2D.SmoothingMode]::HighQuality
              $gfx.PixelOffsetMode = [System.Drawing.Drawing2D.PixelOffsetMode]::HighQuality
              $gfx.CompositingQuality = [System.Drawing.Drawing2D.CompositingQuality]::HighQuality
              $gfx.DrawImage($img, 0, 0, $size, $size)
            }
            finally {
              $gfx.Dispose()
            }

            $hIcon = $bmp.GetHicon()

            Add-Type @"
          using System;
          using System.Runtime.InteropServices;
          public static class Win32 {
            [DllImport("user32.dll", SetLastError=true)]
            public static extern bool DestroyIcon(IntPtr hIcon);
          }
          "@

            try {
              $icon = [System.Drawing.Icon]::FromHandle($hIcon)
              try {
                $fs = New-Object System.IO.FileStream($OutIco, [System.IO.FileMode]::Create)
                try { $icon.Save($fs) } finally { $fs.Dispose() }
              }
              finally {
                $icon.Dispose()
              }
            }
            finally {
              [Win32]::DestroyIcon($hIcon) | Out-Null
              $bmp.Dispose()
            }
          }
          finally {
            $img.Dispose()
          }

          Copy-Item $OutIco 'src-tauri/icons/icon.ico' -Force

          # Reject PNG-compressed frames (RC.EXE will error RC2175)
          $bytes = [System.IO.File]::ReadAllBytes($OutIco)
          $pngSig = [byte[]](0x89,0x50,0x4E,0x47,0x0D,0x0A,0x1A,0x0A)
          for ($i = 0; $i -le $bytes.Length - $pngSig.Length; $i++) {
            $match = $true
            for ($j = 0; $j -lt $pngSig.Length; $j++) {
              if ($bytes[$i + $j] -ne $pngSig[$j]) { $match = $false; break }
            }
            if ($match) { throw 'public/favicon.ico contains PNG-compressed frame data (not RC-compatible)' }
          }

      - name: "macOS: generate icon.icns"
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail

          SRC="src-tauri/icons/icon.png"
          OUT_DIR="src-tauri/icons"
          ICONSET_DIR="${RUNNER_TEMP}/icon.iconset"

          rm -rf "$ICONSET_DIR"
          mkdir -p "$ICONSET_DIR"

          sizes=(16 32 64 128 256 512)
          for s in "${sizes[@]}"; do
            sips -z "$s" "$s" "$SRC" --out "$ICONSET_DIR/icon_${s}x${s}.png" >/dev/null
            s2=$((s*2))
            sips -z "$s2" "$s2" "$SRC" --out "$ICONSET_DIR/icon_${s}x${s}@2x.png" >/dev/null
          done

          iconutil -c icns "$ICONSET_DIR" -o "$OUT_DIR/icon.icns"

      - name: "macOS: create CI config with icns icon"
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail

          node --input-type=module - <<'NODE'
          import fs from 'node:fs';

          const p = 'src-tauri/tauri.release.conf.json';
          const cfg = JSON.parse(fs.readFileSync(p, 'utf8'));
          cfg.bundle = cfg.bundle || {};
          cfg.bundle.icon = ['icons/icon.icns'];
          fs.writeFileSync('src-tauri/tauri.ci.macos.conf.json', JSON.stringify(cfg, null, 2));
          NODE

      - name: Build Tauri
        shell: bash
        env:
          RUST_BACKTRACE: 1
        run: |
          set -euo pipefail

          mkdir -p ci-logs
          LOG_FILE="ci-logs/tauri-build-${{ matrix.channel }}.log"

          {
            case "${{ matrix.channel }}" in
              linux)
                npm run tauri -- build --bundles appimage --config src-tauri/tauri.release.conf.json
                ;;
              mac)
                npm run tauri -- build --bundles dmg --no-sign --config src-tauri/tauri.ci.macos.conf.json
                ;;
              windows)
                npm run tauri -- build --no-bundle --config src-tauri/tauri.release.conf.json
                ;;
              *)
                echo "Unknown channel: ${{ matrix.channel }}" >&2
                exit 1
                ;;
            esac
          } 2>&1 | tee "$LOG_FILE"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: tauri-build-logs-${{ matrix.channel }}
          path: ci-logs/tauri-build-${{ matrix.channel }}.log
          if-no-files-found: warn

      - name: Prepare itch upload directory
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          rm -rf "itch-upload/${{ matrix.channel }}"
          mkdir -p "itch-upload/${{ matrix.channel }}"

          if [ "${{ matrix.channel }}" = "windows" ]; then
            if [ -f src-tauri/target/release/studio-magnate.exe ]; then
              cp src-tauri/target/release/studio-magnate.exe "itch-upload/windows/"
            else
              cp src-tauri/target/release/*.exe "itch-upload/windows/"
            fi

            cp src-tauri/target/release/*.dll "itch-upload/windows/" || true

            if [ -d src-tauri/target/release/resources ]; then
              cp -R src-tauri/target/release/resources "itch-upload/windows/resources"
            fi

            exit 0
          fi

          if [ "${{ matrix.channel }}" = "linux" ]; then
            appimages=(src-tauri/target/release/bundle/appimage/*.AppImage)
            if [ ${#appimages[@]} -lt 1 ]; then
              echo "No AppImage bundle found at src-tauri/target/release/bundle/appimage/*.AppImage" >&2
              exit 1
            fi

            cp "${appimages[0]}" "itch-upload/linux/"
            exit 0
          fi

          if [ "${{ matrix.channel }}" = "mac" ]; then
            dmgs=(src-tauri/target/release/bundle/dmg/*.dmg)
            if [ ${#dmgs[@]} -ge 1 ]; then
              cp "${dmgs[0]}" "itch-upload/mac/"
              exit 0
            fi

            apps=(src-tauri/target/release/bundle/macos/*.app)
            if [ ${#apps[@]} -lt 1 ]; then
              echo "No dmg or .app bundle found." >&2
              exit 1
            fi

            ditto -c -k --sequesterRsrc --keepParent "${apps[0]}" "itch-upload/mac/studio-magnate-macos.zip"
            exit 0
          fi

          echo "Unknown channel: ${{ matrix.channel }}" >&2
          exit 1

      - name: Upload itch artifact
        uses: actions/upload-artifact@v6
        with:
          name: itch-upload-${{ matrix.channel }}
          path: itch-upload/${{ matrix.channel }}
          if-no-files-found: error

  upload:
    name: Upload to itch.io
    runs-on: ubuntu-22.04
    needs: [build]

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'release' && format('refs/tags/{0}', github.event.release.tag_name) || github.ref }}

      - name: Validate itch.io secrets
        shell: bash
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_TARGET: ${{ secrets.ITCH_TARGET || vars.ITCH_TARGET }}
          ITCH_USERNAME: ${{ secrets.ITCH_USERNAME || vars.ITCH_USERNAME }}
          ITCH_GAME: ${{ secrets.ITCH_GAME || vars.ITCH_GAME }}
        run: |
          set -euo pipefail

          if [ -z "${BUTLER_API_KEY:-}" ]; then
            echo "Missing BUTLER_API_KEY secret." >&2
            exit 1
          fi

          if [ -z "${ITCH_TARGET:-}" ] && { [ -z "${ITCH_USERNAME:-}" ] || [ -z "${ITCH_GAME:-}" ]; }; then
            echo "Missing ITCH_TARGET or ITCH_USERNAME+ITCH_GAME." >&2
            exit 1
          fi

      - name: Download Windows artifact
        uses: actions/download-artifact@v7
        with:
          name: itch-upload-windows
          path: itch-upload/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v7
        with:
          name: itch-upload-linux
          path: itch-upload/linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v7
        with:
          name: itch-upload-mac
          path: itch-upload/mac

      - name: Setup butler
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(curl -fsSL "https://broth.itch.zone/butler/linux-amd64/LATEST")"
          echo "Installing butler ${VERSION} (linux-amd64)"

          OUT_DIR="${RUNNER_TEMP}/butler"
          rm -rf "$OUT_DIR"
          mkdir -p "$OUT_DIR"

          curl -fsSL -o "$OUT_DIR/butler.zip" "https://broth.itch.zone/butler/linux-amd64/${VERSION}/archive/default"
          python -c 'import sys, zipfile; zipfile.ZipFile(sys.argv[1]).extractall(sys.argv[2])' "$OUT_DIR/butler.zip" "$OUT_DIR"

          BUTLER_BIN=""
          if [ -f "$OUT_DIR/butler" ]; then
            BUTLER_BIN="$OUT_DIR/butler"
          elif [ -f "$OUT_DIR/butler.exe" ]; then
            BUTLER_BIN="$OUT_DIR/butler.exe"
          else
            echo "butler binary not found in $OUT_DIR" >&2
            ls -la "$OUT_DIR" >&2
            exit 1
          fi

          chmod +x "$OUT_DIR/butler"* || true

          # $GITHUB_PATH only affects subsequent steps, so run butler via absolute path here.
          echo "$OUT_DIR" >> "$GITHUB_PATH"
          "$BUTLER_BIN" -V

      - name: Upload to itch.io
        shell: bash
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_TARGET: ${{ secrets.ITCH_TARGET || vars.ITCH_TARGET }}
          ITCH_USERNAME: ${{ secrets.ITCH_USERNAME || vars.ITCH_USERNAME }}
          ITCH_GAME: ${{ secrets.ITCH_GAME || vars.ITCH_GAME }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          mkdir -p ci-logs
          BUTLER_LOG_FILE="ci-logs/butler-upload.log"
          : > "$BUTLER_LOG_FILE"

          VERSION="${INPUT_VERSION:-}"

          if [ -z "$VERSION" ] && [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            VERSION="${VERSION#v}"
          fi

          if [ -z "$VERSION" ] && [ -n "${RELEASE_TAG:-}" ]; then
            VERSION="${RELEASE_TAG#v}"
          fi

          if [ -z "$VERSION" ]; then
            VERSION="$(python - <<'PY'
          import json
          with open('package.json', 'r', encoding='utf-8') as f:
            print(json.load(f)['version'])
          PY
          )"
          fi

          TARGET_BASE=""
          if [ -n "${ITCH_TARGET:-}" ]; then
            TARGET_BASE="$(echo "$ITCH_TARGET" | tr '[:upper:]' '[:lower:]')"
          else
            TARGET_USER="$(echo "$ITCH_USERNAME" | tr '[:upper:]' '[:lower:]')"
            TARGET_GAME="$(echo "$ITCH_GAME" | tr '[:upper:]' '[:lower:]')"
            TARGET_BASE="${TARGET_USER}/${TARGET_GAME}"
          fi

          {
            echo "butler version:";
            butler -V;
            echo;

            for channel in windows linux mac; do
              SRC_DIR="itch-upload/${channel}"

              # download-artifact preserves paths; if we uploaded "itch-upload/<channel>", we may end up with
              # "itch-upload/<channel>/itch-upload/<channel>" after download.
              if [ -d "${SRC_DIR}/itch-upload/${channel}" ]; then
                SRC_DIR="${SRC_DIR}/itch-upload/${channel}"
              fi

              if [ ! -d "$SRC_DIR" ]; then
                echo "Missing upload directory for ${channel}: ${SRC_DIR}" >&2
                exit 1
              fi

              if ! find "$SRC_DIR" -type f -maxdepth 2 | head -n 1 >/dev/null; then
                echo "Upload directory is empty for ${channel}: ${SRC_DIR}" >&2
                exit 1
              fi

              echo "Uploading ${SRC_DIR} -> ${TARGET_BASE}:${channel} (userversion: $VERSION)";
              butler push "$SRC_DIR" "${TARGET_BASE}:${channel}" --userversion "$VERSION";
              echo;
            done
          } 2>&1 | tee "$BUTLER_LOG_FILE"

      - name: Upload butler logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: butler-upload-logs
          path: ci-logs/butler-upload.log
          if-no-files-found: warn
