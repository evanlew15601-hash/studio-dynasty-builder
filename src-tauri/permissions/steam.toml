[[permission]]
identifier = "steam-default"
description = "Allow the frontend to interact with Steamworks (Steam achievements + overlay)."
commands.allow = [
  "steam_is_available",
  "steamIsAvailable",
  "steam_get_persona_name",
  "steamGetPersonaName",
  "steam_is_dlc_installed",
  "steamIsDlcInstalled",
  "steam_unlock_achievement",
  "steamUnlockAchievement",
  "steam_open_overlay",
  "steamOpenOverlay",
  "steam_open_store_overlay",
  "steamOpenStoreOverlay"
]
